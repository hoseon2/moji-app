<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOJI — 나만의 이모티콘</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

:root {
  --cream: #F5F0E8;
  --beige: #EAE3D2;
  --tan: #C9BA9B;
  --brown: #5C3D2E;
  --dark: #2A1A0E;
  --accent: #B85C38;
  --white: #FDFAF5;
  --gray: #9E8E7A;
  --light-gray: #E8E0D0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

nav {
  background: var(--white);
  border-bottom: 1px solid var(--beige);
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--brown);
  letter-spacing: 2px;
}
.nav-logo span { color: var(--accent); }
.nav-badge {
  font-size: 11px;
  background: var(--beige);
  color: var(--gray);
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
  letter-spacing: 1px;
}

.hero {
  text-align: center;
  padding: 64px 20px 48px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-tag {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 5vw, 52px);
  color: var(--dark);
  line-height: 1.15;
  margin-bottom: 16px;
}

.hero h1 em { font-style: italic; color: var(--accent); }

.hero p {
  font-size: 15px;
  color: var(--gray);
  font-weight: 300;
  line-height: 1.8;
  max-width: 400px;
  margin: 0 auto;
}

.mode-toggle {
  display: flex;
  justify-content: center;
  gap: 0;
  margin: 40px auto 0;
  background: var(--beige);
  border-radius: 12px;
  padding: 4px;
  width: fit-content;
}

.mode-btn {
  padding: 10px 28px;
  border: none;
  background: transparent;
  border-radius: 9px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.mode-btn.active {
  background: var(--white);
  color: var(--brown);
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(92,61,46,0.1);
}

.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gray);
  text-transform: uppercase;
  margin-bottom: 14px;
}

.upload-section {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 32px;
}

.upload-section.couple-mode { grid-template-columns: 1fr 1fr; }

.upload-card {
  background: var(--white);
  border: 1.5px dashed var(--tan);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 12px;
}

.upload-card:hover { border-color: var(--accent); background: var(--cream); }
.upload-card.filled { border-style: solid; border-color: var(--tan); }

.upload-card input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon-wrap {
  width: 56px;
  height: 56px;
  background: var(--beige);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: transform 0.2s;
}

.upload-card:hover .upload-icon-wrap { transform: scale(1.08); }
.upload-label { font-size: 13px; font-weight: 500; color: var(--brown); }
.upload-sub { font-size: 11px; color: var(--tan); }

.upload-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  border-radius: 14px;
}

.upload-preview.show { display: block; }

.remove-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 28px;
  height: 28px;
  background: rgba(44,26,14,0.6);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 14px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

.remove-btn:hover { background: var(--accent); }
.remove-btn.show { display: flex; }

.style-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}

.style-card {
  background: var(--white);
  border: 1.5px solid var(--light-gray);
  border-radius: 12px;
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.18s;
}

.style-card:hover { border-color: var(--tan); transform: translateY(-2px); }
.style-card.active {
  border-color: var(--accent);
  background: #FEF6F2;
  box-shadow: 0 4px 16px rgba(184,92,56,0.12);
}

.style-card .icon { font-size: 26px; margin-bottom: 6px; display: block; }
.style-card .name { font-size: 12px; font-weight: 700; color: var(--brown); }
.style-card .desc { font-size: 10px; color: var(--tan); margin-top: 2px; }

.expr-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 32px;
}

.expr-pill {
  border: 1.5px solid var(--light-gray);
  background: var(--white);
  border-radius: 50px;
  padding: 8px 16px;
  font-size: 12px;
  font-weight: 500;
  color: var(--brown);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
}

.expr-pill:hover { border-color: var(--tan); }
.expr-pill.active {
  background: var(--brown);
  border-color: var(--brown);
  color: var(--white);
}

.divider {
  height: 1px;
  background: var(--light-gray);
  margin: 28px 0;
}

.gen-btn {
  width: 100%;
  padding: 18px;
  background: var(--brown);
  color: var(--white);
  border: none;
  border-radius: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 16px;
}

.gen-btn:hover:not(:disabled) {
  background: var(--dark);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(42,26,14,0.2);
}

.gen-btn:disabled { background: var(--tan); cursor: not-allowed; }

.result-section { display: none; animation: fadeIn 0.5s ease; }
.result-section.show { display: block; }

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.result-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--dark);
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.result-item {
  background: var(--white);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--light-gray);
  transition: transform 0.2s;
}

.result-item:hover { transform: scale(1.02); }

.result-item img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
}

.result-item-label {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  color: var(--brown);
  border-top: 1px solid var(--light-gray);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.dl-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.dl-btn:hover { opacity: 1; }

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.action-btn {
  padding: 14px;
  border-radius: 12px;
  border: 1.5px solid var(--light-gray);
  background: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--brown);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.action-btn:hover { background: var(--beige); border-color: var(--tan); }
.action-btn.kakao { background: #FEE500; border-color: #FEE500; color: #3C1E1E; }
.action-btn.kakao:hover { background: #FFD600; }

/* 로딩 */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(245,240,232,0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  backdrop-filter: blur(6px);
}

.loading-overlay.show { display: flex; }

.loader {
  width: 48px;
  height: 48px;
  border: 3px solid var(--beige);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { font-size: 15px; font-weight: 700; color: var(--brown); }
.loading-step { font-size: 12px; color: var(--tan); }

.progress-bar-wrap {
  width: 240px;
  height: 4px;
  background: var(--beige);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--brown));
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s ease;
}

.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--dark);
  color: var(--cream);
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 300;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  .style-grid { grid-template-columns: repeat(3, 1fr); }
  .upload-section.couple-mode { grid-template-columns: 1fr; }
  nav { padding: 0 20px; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">이모티콘 생성 중...</div>
  <div class="loading-step" id="loadingStep">AI가 열심히 그리고 있어요 ✏️</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav>
  <div class="nav-logo">MO<span>JI</span></div>
  <div class="nav-badge">AI EMOJI MAKER</div>
</nav>

<div class="hero">
  <div class="hero-tag">AI Emoji Maker</div>
  <h1>사진 한 장으로<br><em>나만의 이모티콘</em></h1>
  <p>커플, 친구, 혼자도 OK.<br>스타일을 선택하면 AI가 이모티콘을 만들어드려요.</p>

  <div class="mode-toggle">
    <button class="mode-btn active" id="soloBtn" onclick="setMode('solo')">🙋 혼자</button>
    <button class="mode-btn" id="coupleBtn" onclick="setMode('couple')">👫 커플 / 친구</button>
  </div>
</div>

<div class="main">

  <div class="section-title">사진 업로드</div>
  <div class="upload-section" id="uploadSection">
    <div class="upload-card" id="card1">
      <input type="file" accept="image/*" onchange="handleUpload(event,1)" />
      <div class="upload-icon-wrap" id="icon1">🤳</div>
      <div class="upload-label" id="label1">사진을 올려주세요</div>
      <div class="upload-sub" id="sub1">JPG, PNG 지원</div>
      <img class="upload-preview" id="preview1" />
      <button class="remove-btn" id="remove1" onclick="removeImg(event,1)">✕</button>
    </div>
    <div class="upload-card" id="card2" style="display:none">
      <input type="file" accept="image/*" onchange="handleUpload(event,2)" />
      <div class="upload-icon-wrap" id="icon2">🤳</div>
      <div class="upload-label" id="label2">두 번째 사진</div>
      <div class="upload-sub" id="sub2">친구 / 파트너</div>
      <img class="upload-preview" id="preview2" />
      <button class="remove-btn" id="remove2" onclick="removeImg(event,2)">✕</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-title">이모티콘 스타일</div>
  <div class="style-grid">
    <div class="style-card active" onclick="selectStyle(this,'kakao')">
      <span class="icon">🐥</span>
      <div class="name">카카오풍</div>
      <div class="desc">동글동글</div>
    </div>
    <div class="style-card" onclick="selectStyle(this,'anime')">
      <span class="icon">🌸</span>
      <div class="name">애니메이션</div>
      <div class="desc">큰눈 파스텔</div>
    </div>
    <div class="style-card" onclick="selectStyle(this,'chibi')">
      <span class="icon">👶</span>
      <div class="name">치비</div>
      <div class="desc">SD 캐릭터</div>
    </div>
    <div class="style-card" onclick="selectStyle(this,'pixel')">
      <span class="icon">👾</span>
      <div class="name">픽셀아트</div>
      <div class="desc">도트 레트로</div>
    </div>
    <div class="style-card" onclick="selectStyle(this,'sticker')">
      <span class="icon">🎨</span>
      <div class="name">스티커</div>
      <div class="desc">팝 일러스트</div>
    </div>
  </div>

  <div class="section-title">표정 / 상황</div>
  <div class="expr-row">
    <button class="expr-pill active" onclick="selectExpr(this)">😆 신나요</button>
    <button class="expr-pill" onclick="selectExpr(this)">🥰 설레요</button>
    <button class="expr-pill" onclick="selectExpr(this)">😭 슬퍼요</button>
    <button class="expr-pill" onclick="selectExpr(this)">😤 화났어요</button>
    <button class="expr-pill" onclick="selectExpr(this)">🤣 웃겨요</button>
    <button class="expr-pill" onclick="selectExpr(this)">😴 졸려요</button>
    <button class="expr-pill" onclick="selectExpr(this)">🤩 놀라요</button>
    <button class="expr-pill" onclick="selectExpr(this)">💕 사랑해요</button>
    <button class="expr-pill" onclick="selectExpr(this)">😎 쿨해요</button>
    <button class="expr-pill" onclick="selectExpr(this)">🥺 부탁해요</button>
  </div>

  <div class="divider"></div>

  <button class="gen-btn" id="genBtn" onclick="generate()">
    ✨ 이모티콘 만들기
  </button>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <div class="result-title">완성! 🎉</div>
      <button onclick="resetResult()" style="background:none;border:none;font-size:13px;color:var(--tan);cursor:pointer;font-family:'Noto Sans KR',sans-serif;">다시 만들기 →</button>
    </div>
    <div class="result-grid" id="resultGrid"></div>
    <div class="action-row">
      <button class="action-btn" onclick="saveAll()">💾 전체 저장</button>
      <button class="action-btn kakao" onclick="shareKakao()">💬 카카오 공유</button>
    </div>
  </div>

</div>

<script>
let mode = 'solo';
let img1 = null, img2 = null;
let selectedStyleKey = 'kakao';
let selectedExpr = '😆 신나요';
let generatedImages = [];

const STYLE_PROMPTS = {
  kakao: 'KakaoTalk emoticon style, cute chubby round face character, simple bold outlines, soft pastel colors, white background, chibi proportions, expressive large eyes, sticker design',
  anime: 'cute anime character, big sparkling eyes, soft pastel colors, Japanese manga kawaii style, smooth clean lines, white background, sticker',
  chibi: 'chibi SD character, super deformed 1:2 ratio, cute round head, bold outlines, vibrant colors, white background, sticker style',
  pixel: 'cute pixel art character, 64x64 pixel style, retro 8-bit, clean pixel edges, pastel colors, white background',
  sticker: 'cute LINE sticker style illustration, bold thick white border outline, vibrant flat colors, playful modern character, white background'
};

const EXPR_PROMPTS = {
  '😆 신나요': 'very excited expression, jumping with joy, big smile, arms raised high',
  '🥰 설레요': 'blushing face, heart eyes, shy cute smile, pink cheeks, floating hearts',
  '😭 슬퍼요': 'crying with big anime tears, sad pouty face, droopy eyes',
  '😤 화났어요': 'angry expression, red face, steam from head, furrowed brows',
  '🤣 웃겨요': 'laughing so hard, tears of joy, rolling around, huge grin',
  '😴 졸려요': 'very sleepy, half closed eyes, ZZZ bubble floating, yawning',
  '🤩 놀라요': 'shocked surprised face, wide star eyes, mouth wide open, sparkles',
  '💕 사랑해요': 'in love expression, heart eyes, rosy cheeks, surrounded by pink hearts',
  '😎 쿨해요': 'cool confident expression, sunglasses, thumbs up, relaxed smile',
  '🥺 부탁해요': 'pleading face, huge puppy eyes, hands clasped together, adorable'
};

function setMode(m) {
  mode = m;
  document.getElementById('soloBtn').classList.toggle('active', m === 'solo');
  document.getElementById('coupleBtn').classList.toggle('active', m === 'couple');
  document.getElementById('card2').style.display = m === 'couple' ? 'flex' : 'none';
  document.getElementById('uploadSection').classList.toggle('couple-mode', m === 'couple');
}

function handleUpload(e, num) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const image = new Image();
    image.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 512;
      let w = image.width, h = image.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(image, 0, 0, w, h);
      const b64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
      if (num === 1) img1 = b64; else img2 = b64;

      const preview = document.getElementById('preview' + num);
      preview.src = 'data:image/jpeg;base64,' + b64;
      preview.classList.add('show');
      document.getElementById('card' + num).classList.add('filled');
      document.getElementById('remove' + num).classList.add('show');
      document.getElementById('icon' + num).style.display = 'none';
      document.getElementById('label' + num).style.display = 'none';
      document.getElementById('sub' + num).style.display = 'none';
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function removeImg(e, num) {
  e.stopPropagation();
  if (num === 1) img1 = null; else img2 = null;
  document.getElementById('preview' + num).classList.remove('show');
  document.getElementById('card' + num).classList.remove('filled');
  document.getElementById('remove' + num).classList.remove('show');
  document.getElementById('icon' + num).style.display = '';
  document.getElementById('label' + num).style.display = '';
  document.getElementById('sub' + num).style.display = '';
}

function selectStyle(el, key) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedStyleKey = key;
}

function selectExpr(el) {
  document.querySelectorAll('.expr-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedExpr = el.textContent.trim();
}

async function generate() {
  if (mode === 'couple' && (!img1 || !img2)) {
    showToast('📸 두 장 모두 올려주세요!'); return;
  }

  showLoading('이모티콘 생성 중...', '1 / 4 생성 시작...');
  setProgress(5);

  const stylePrompt = STYLE_PROMPTS[selectedStyleKey];
  const exprPrompt = EXPR_PROMPTS[selectedExpr] || 'happy expression';

  const exprs = mode === 'solo'
    ? [selectedExpr, '🥰 설레요', '😎 쿨해요', '🥺 부탁해요']
    : [selectedExpr, '💕 사랑해요'];

  generatedImages = [];
  document.getElementById('resultGrid').innerHTML = '';

  try {
    for (let i = 0; i < exprs.length; i++) {
      const ep = EXPR_PROMPTS[exprs[i]] || exprPrompt;
      updateLoadingStep(`${i + 1} / ${exprs.length} 생성 중...`);
      setProgress(10 + (i / exprs.length) * 85);

      let prompt;
      if (mode === 'couple') {
        prompt = `Two cute matching characters together as a couple emoji sticker. ${stylePrompt}. Both characters side by side, ${ep}. Matching outfit colors, adorable couple pose. White background. High quality sticker illustration.`;
      } else {
        prompt = `Single cute emoji sticker character. ${stylePrompt}. ${ep}. Centered on white background. High quality sticker illustration. No text.`;
      }

      // Vercel 서버리스 API 호출
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'API 오류');
      if (data.url) generatedImages.push({ url: data.url, label: exprs[i] });
    }

    setProgress(100);
    if (generatedImages.length === 0) throw new Error('이미지 생성 실패');
    showResults();
  } catch (err) {
    showToast('⚠️ ' + err.message);
    console.error(err);
  } finally {
    setTimeout(hideLoading, 500);
  }
}

function showResults() {
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = generatedImages.map((item, i) => `
    <div class="result-item">
      <img src="${item.url}" alt="${item.label}" loading="lazy" />
      <div class="result-item-label">
        <span>${item.label}</span>
        <button class="dl-btn" onclick="downloadImg('${item.url}', ${i})">⬇️</button>
      </div>
    </div>
  `).join('');
  document.getElementById('resultSection').classList.add('show');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function downloadImg(url, idx) {
  try {
    const res = await fetch(url);
    const blob = await res.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `moji_${idx + 1}.png`;
    a.click();
    showToast('💾 저장됐어요!');
  } catch { window.open(url, '_blank'); }
}

async function saveAll() {
  for (let i = 0; i < generatedImages.length; i++) {
    await downloadImg(generatedImages[i].url, i);
    await new Promise(r => setTimeout(r, 500));
  }
}

function shareKakao() {
  const text = 'MOJI로 만든 나만의 이모티콘 🎨';
  if (navigator.share) {
    navigator.share({ title: 'MOJI', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href)
      .then(() => showToast('🔗 링크가 복사됐어요!'));
  }
}

function resetResult() {
  document.getElementById('resultSection').classList.remove('show');
  generatedImages = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showLoading(text, step) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingStep').textContent = step;
  document.getElementById('loading').classList.add('show');
}

function updateLoadingStep(text) {
  document.getElementById('loadingStep').textContent = text;
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

function hideLoading() {
  document.getElementById('loading').classList.remove('show');
  setProgress(0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
